<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profesyonel Asistan Paneli</title>
    <style>
        body { background: #0a192f; font-family: 'Segoe UI', sans-serif; color: #e6f1ff; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: #112240; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #64ffda; border-bottom: 2px solid #233554; padding-bottom: 10px; }
        h3 { color: #64ffda; margin-top: 25px; display: flex; align-items: center; gap: 10px; }
        
        input, textarea { 
            width: 100%; background: #233554; border: 1px solid #303C55; border-radius: 8px; 
            padding: 12px; color: white; margin-bottom: 10px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: #64ffda; }
        
        .row { display: flex; gap: 10px; margin-bottom: 5px; }
        .time { width: 120px; }
        
        .btn {
            width: 100%; background: transparent; border: 2px solid #64ffda; color: #64ffda;
            padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px;
            transition: 0.3s; margin-top: 20px;
        }
        .btn:hover { background: rgba(100, 255, 218, 0.1); }
        
        .alarm-section { background: #1d2d50; padding: 15px; border-radius: 10px; border-left: 4px solid #64ffda; }
    </style>
</head>
<body>

<div class="container">
    <h1>💼 Asistan Yönetim Paneli</h1>

    <div class="alarm-section">
        <h3>🔔 Toplantı Alarmı & Hatırlatıcı</h3>
        <p style="font-size: 12px; color: #8892b0;">Toplantı saati gelince tarayıcı size bildirim gönderecektir.</p>
        <div class="row">
            <input type="time" id="alarmTime" class="time">
            <input type="text" id="alarmDesc" placeholder="Toplantı Konusu...">
        </div>
        <button class="btn" onclick="askPermission()" style="padding: 8px; font-size: 12px;">Bildirim İzni Ver</button>
    </div>

    <h3>📅 Günlük Planlarım</h3>
    <textarea id="dailyPlan" rows="4" placeholder="Bugün yapılacaklar..."></textarea>

    <h3>🗓️ Haftalık Planlarım</h3>
    <textarea id="weeklyPlan" rows="4" placeholder="Bu hafta öncelikli olanlar..."></textarea>

    <button class="btn" onclick="saveAll()">Her Şeyi Kaydet ve Aktif Et</button>
    <p id="status" style="text-align:center; color: #8892b0; margin-top:10px;"></p>
</div>

<script>
    // Sayfa açıldığında verileri yükle
    window.onload = function() {
        document.getElementById('dailyPlan').value = localStorage.getItem('daily') || "";
        document.getElementById('weeklyPlan').value = localStorage.getItem('weekly') || "";
        document.getElementById('alarmTime').value = localStorage.getItem('aTime') || "";
        document.getElementById('alarmDesc').value = localStorage.getItem('aDesc') || "";
        
        // Arka planda saati kontrol etmeye başla
        setInterval(checkAlarm, 10000); // Her 10 saniyede bir kontrol eder
    };

    function saveAll() {
        localStorage.setItem('daily', document.getElementById('dailyPlan').value);
        localStorage.setItem('weekly', document.getElementById('weeklyPlan').value);
        localStorage.setItem('aTime', document.getElementById('alarmTime').value);
        localStorage.setItem('aDesc', document.getElementById('alarmDesc').value);
        
        document.getElementById('status').innerText = "Tüm veriler kaydedildi!";
        setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000);
    }

    // Bildirim İzni İsteme
    function askPermission() {
        Notification.requestPermission().then(perm => {
            if(perm === "granted") alert("Bildirim izni verildi!");
        });
    }

    // Alarm Kontrolü
    function checkAlarm() {
        const now = new Date();
        const currentTime = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        const setTime = document.getElementById('alarmTime').value;
        const desc = document.getElementById('alarmDesc').value;

        if (currentTime === setTime) {
            if (Notification.permission === "granted") {
                new Notification("Toplantı Vakti!", { body: desc });
            } else {
                alert("TOPLANTI VAKTİ: " + desc);
            }
        }
    }
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGS Dijital Asistanım</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-cubugu">
        <h2>Asistan</h2>
        <button onclick="sayfaAc('gunluk')">Günlük Notlarım</button>
        <button onclick="sayfaAc('haftalik')">Haftalık Planlayıcı</button>
        <button onclick="sayfaAc('aylik')">Aylık Planlayıcı</button>
        <button onclick="sayfaAc('toplanti')">Toplantılar</button>
        <button onclick="sayfaAc('randevu')">Randevular</button>
    </div>

    <div class="icerik-alani">
        <div id="gunluk" class="sayfa-icerik">
            <h1>Günlük Notlarım</h1>
           <textarea id="not-alanı" 
               style="width:100%; height:150px;" placeholder="Bugün Neler Yapacaksın?"></textarea>
            <br>
            <button onclick="notEkle()">Notu Kaydet</button>
                <div id="kayıtlı-notlar">
                    <h3>Yapılcaklar Listesi</h3>
                </div>
                <div id="tamamlananlar">
                    <h3>Tamamlananlar </h3>
              </div>
        </div>
            <div id="haftalik" 
                class="sayfa-icerik"
                style="display:none;">
            <h1>Haftalık Planlayıcı</h1>
                <table border="1" style="width: 100%; border-collapse: collapse;
                    table-layout:fixed;">
        <tr>
            <th>Pazartesi</th>
            <th>Salı</th>
            <th>Çarşamba</th>
            <th>Perşembe</th>
            <th>Cuma</th>
            <th>Cumartesi</th>
            <th>Pazar</th>
        </tr>
        <tr>
            <td height="250"></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
            <td></td>
        </tr>
    </table>
</div>
       

    <script src="script.js"></script>
</body>
</html>

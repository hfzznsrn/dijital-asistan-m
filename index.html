<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TGS Dijital Asistanım</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="menu-cubugu">
        <h2>Asistan</h2>
        <button onclick="sayfaAc('gunluk')">Günlük Notlarım</button>
        <button onclick="sayfaAc('haftalik')">Haftalık Planlayıcı</button>
        <button onclick="sayfaAc('aylik')">Aylık Planlayıcı</button>
        <button onclick="sayfaAc('toplanti')">Toplantılar</button>
        <button onclick="sayfaAc('randevu')">Randevular</button>
    </div>

   <div class="icerik-alani">
    <div id="gunluk" class="sayfa-icerik">
        <h1>Günlük Notlarım</h1>
        <textarea id="not-alani" style="width:100%; height:150px; border-radius:10px; padding:10px;" placeholder="Bugün neler yapacaksın?"></textarea>
        <br>
        <button onclick="notEkle()" style="margin-top:10px; padding:10px 20px; background:navy; color:white; border:none; border-radius:5px; cursor:pointer;">Notu Kaydet</button>
        
        <div style="margin-top:20px;">
            <h3>Yapılacaklar</h3>
            <div id="kayitli-notlar"></div>
        </div>

        <div style="margin-top:20px; opacity:0.6;">
            <h3>Tamamlananlar</h3>
            <div id="tamamlanan-notlar"></div>
        </div>
    </div>

    <div id="haftalik" class="sayfa-icerik" style="display:none;">
    <h1 style="color: navy;">Haftalık Planlayıcı</h1>
    <table border="1" style="width: 100%; border-collapse: collapse; background-color: white;">
        <thead>
            <tr style="background-color: navy; color: white;">
                <th style="padding: 10px; border: 1px solid white;">Pazartesi</th>
                <th style="padding: 10px; border: 1px solid white;">Salı</th>
                <th style="padding: 10px; border: 1px solid white;">Çarşamba</th>
                <th style="padding: 10px; border: 1px solid white;">Perşembe</th>
                <th style="padding: 10px; border: 1px solid white;">Cuma</th>
                <th style="padding: 10px; border: 1px solid white;">Cumartesi</th>
                <th style="padding: 10px; border: 1px solid white;">Pazar</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td style="border: 1px solid navy;"><textarea style="width:100%; height:300px; border:none; outline:none; padding:5px; box-sizing: border-box;"></textarea></td>
                <td style="border: 1px solid navy;"><textarea style="width:100%; height:300px; border:none; outline:none; padding:5px; box-sizing: border-box;"></textarea></td>
                <td style="border: 1px solid navy;"><textarea style="width:100%; height:300px; border:none; outline:none; padding:5px; box-sizing: border-box;"></textarea></td>
                <td style="border: 1px solid navy;"><textarea style="width:100%; height:300px; border:none; outline:none; padding:5px; box-sizing: border-box;"></textarea></td>
                <td style="border: 1px solid navy;"><textarea style="width:100%; height:300px; border:none; outline:none; padding:5px; box-sizing: border-box;"></textarea></td>
                <td style="border: 1px solid navy;"><textarea style="width:100%; height:300px; border:none; outline:none; padding:5px; box-sizing: border-box;"></textarea></td>
                <td style="border: 1px solid navy;"><textarea style="width:100%; height:300px; border:none; outline:none; padding:5px; box-sizing: border-box;"></textarea></td>
            </tr>
        </tbody>
    </table>
</div>

  <div id="aylik" class="sayfa-icerik" style="display:none; padding: 20px;">
        <h1 style="color: navy; margin-bottom: 20px;">Nisan 2026</h1>
        <div id="takvim-kutusu" style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 15px;">
            </div>
    </div>

</div> <script src="script.js"></script>
</body>
</html>
